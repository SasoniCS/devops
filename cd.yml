name: CD
on:
  push:
    branches: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Simular deploy
        uses: actions/upload-artifact@v4
        with: 
          name: projetozipado.zip
          path: |
            **.py
            README.md